<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#FAF8F5">
<title>Habit OS // Life Time</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF8F5;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:20px}
.box{text-align:center;max-width:320px;width:100%}
.logo{font-family:'DM Serif Display',serif;font-size:32px;color:#1A1A1A;margin-bottom:4px}
.sub{font-size:11px;color:#9A8F86;letter-spacing:0.12em;margin-bottom:48px;text-transform:uppercase}
.coach-link{display:block;padding:14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.08em;text-decoration:none;transition:all 0.2s;text-align:center;background:#1A1A1A;color:#FAF8F5;text-transform:uppercase;margin-bottom:16px}
.coach-link:hover{background:#C4623A}
.client-note{font-size:11px;color:#C8C0B8;letter-spacing:0.04em;line-height:1.7}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Habit OS</div>
  <div class="sub">Life Time Coaching</div>
  <a href="coach.html" class="coach-link">Coach Login</a>
  <div class="client-note">Clients — use the personal link your coach sent you</div>
</div>
</body>
</html>
