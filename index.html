<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050810">
<title>HABIT_OS // LIFE TIME</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050810;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Share Tech Mono',monospace}
.scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none}
.box{text-align:center;padding:40px 20px}
.logo{font-size:28px;color:#00f5ff;letter-spacing:5px;text-shadow:0 0 20px rgba(0,245,255,0.4);margin-bottom:6px}
.logo span{color:#ff00aa}
.sub{font-size:10px;color:#4a6080;letter-spacing:3px;margin-bottom:40px}
.links{display:flex;flex-direction:column;gap:12px;width:280px}
a{display:block;padding:14px;border-radius:5px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;text-decoration:none;transition:all 0.2s;text-align:center}
.coach-link{border:1px solid rgba(255,170,0,0.5);color:#ffaa00;background:rgba(255,170,0,0.08)}
.coach-link:hover{background:rgba(255,170,0,0.18)}
.client-note{font-size:9px;color:#2a3a50;letter-spacing:1px;margin-top:20px;line-height:1.6}
</style>
</head>
<body>
<div class="scan"></div>
<div class="box">
  <div class="logo">HABIT<span>_</span>OS</div>
  <div class="sub">// LIFE TIME</div>
  <div class="links">
    <a href="coach.html" class="coach-link">⚡ COACH LOGIN</a>
  </div>
  <div class="client-note">Clients: use the personal link<br>your coach sent you</div>
</div>
</body>
</html>
